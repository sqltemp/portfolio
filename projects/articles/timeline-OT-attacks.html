<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ICS Cyber Attack Map (Offline)</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #020617;
    color: white;
}

#map {
    width: 100%;
    height: 100vh;
    position: relative;
}

svg {
    width: 100%;
    height: 100%;
    background: #020617;
}

.marker {
    fill: #ef4444;
    cursor: pointer;
    transition: 0.2s;
}
.marker:hover {
    fill: #f87171;
    transform: scale(1.2);
}

#popup {
    position: absolute;
    background: #0f172a;
    padding: 15px;
    border-radius: 8px;
    display: none;
    max-width: 300px;
    border: 1px solid #334155;
}

.badge {
    display: inline-block;
    padding: 3px 6px;
    margin: 2px;
    border-radius: 4px;
    font-size: 11px;
}

.initial { background: #2563eb; }
.execution { background: #9333ea; }
.lateral { background: #ec4899; }
.impact { background: #ef4444; }

a { color: #38bdf8; }
</style>
</head>

<body>

<div id="map">

<!-- Carte simplifiée monde (projection basique) -->
<svg viewBox="0 0 1000 500">

<!-- continents simplifiés -->
<rect x="0" y="0" width="1000" height="500" fill="#020617"/>

<!-- markers -->
<circle class="marker" cx="620" cy="260" r="6" onclick="showPopup(event, 0)"/>
<circle class="marker" cx="540" cy="200" r="6" onclick="showPopup(event, 1)"/>
<circle class="marker" cx="700" cy="220" r="6" onclick="showPopup(event, 2)"/>
<circle class="marker" cx="720" cy="260" r="6" onclick="showPopup(event, 3)"/>
<circle class="marker" cx="540" cy="200" r="6" onclick="showPopup(event, 4)"/>

</svg>

<div id="popup"></div>

</div>

<script>

const attacks = [
{
name: "Stuxnet (2010)",
desc: "Sabotage nucléaire iranien via PLC",
mitre: ["T0847", "T0851", "T0831"],
tactics: ["initial","execution","lateral","impact"],
link: "https://en.wikipedia.org/wiki/Stuxnet"
},
{
name: "Ukraine Power Grid (2015)",
desc: "Blackout massif (~230k personnes)",
mitre: ["T0866","T0886","T0829"],
tactics: ["initial","lateral","impact"],
link: "https://en.wikipedia.org/wiki/2015_Ukraine_power_grid_hack"
},
{
name: "Industroyer (2016)",
desc: "Malware ICS protocol-aware",
mitre: ["T0855","T0806"],
tactics: ["execution","impact"],
link: "https://www.welivesecurity.com/"
},
{
name: "Triton (2017)",
desc: "Ciblage des systèmes de sécurité industriels",
mitre: ["T0851","T0890"],
tactics: ["execution","impact"],
link: "https://www.dragos.com/"
},
{
name: "Industroyer2 (2022)",
desc: "Attaque ICS en contexte de guerre",
mitre: ["T0855","T0829"],
tactics: ["execution","impact"],
link: "https://www.welivesecurity.com/"
}
];

function showPopup(event, index) {

const attack = attacks[index];

const popup = document.getElementById("popup");

const badges = attack.tactics.map(t =>
`<span class="badge ${t}">${t}</span>`
).join("");

popup.innerHTML = `
<h3>${attack.name}</h3>
<p>${attack.desc}</p>
<div>${badges}</div>
<p><b>MITRE:</b> ${attack.mitre.join(", ")}</p>
<a href="${attack.link}" target="_blank">Lire plus</a>
`;

popup.style.display = "block";
popup.style.left = event.pageX + 10 + "px";
popup.style.top = event.pageY + 10 + "px";
}

// close popup on click outside
document.addEventListener("click", function(e) {
if (!e.target.classList.contains("marker")) {
document.getElementById("popup").style.display = "none";
}
});

</script>

</body>
</html>
